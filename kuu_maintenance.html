<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUUピラティス教室 予約システム変更のご案内</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .maintenance-container {
            background-color: #fff;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            max-width: 80%;
        }

        h1 {
          border-radius: 0;
          color: #a70991;
          font-family: Geneva;
          font-size: 2em;
          font-weight: 700;
        }

        h2 {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2em;
            color: #555;
            line-height: 1.6;
        }

        /* 他のスタイルを追加する場合はここに追加してください */

        @media (max-width: 768px) {
            /* レスポンシブデザインのためのスタイル */
            .maintenance-container {
                max-width: 70%;
            }
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <h1>KUUピラティス教室</h1>
        <h2>予約システム変更のご案内</h2>
        <p>
          いつもレッスンご参加頂きありがとうございます。<br />
          5月以降のレッスンですが、予約システムが変更となりました。<br />
          <a href="https://tol-app.jp/s/kuupila">こちら</a>より再度ご登録いただき、予約の方をお願い致します。<br />
          またキャンセル機能がない為、公式ラインを作りましたので、キャンセルはラインからお願い致します。
        </p>
        <p><a href="https://tol-app.jp/s/kuupila">https://tol-app.jp/s/kuupila</a></p>
    </div>
    <footer>
      <p>&copy; 2026 KUUピラティス教室</p>
    </footer>
</body>
</html>
